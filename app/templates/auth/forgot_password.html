{% extends 'base.html' %}
{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm p-4 rounded-4">
                <div class="text-center mb-4">
                    <h3 class="fw-bold">Forgot Password?</h3>
                    <p class="text-muted">Enter your email to receive a reset code.</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">EMAIL ADDRESS</label>
                        <input type="email" name="email" class="form-control rounded-3" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold">Send OTP</button>
                </form>
                <div class="text-center mt-3">
                    <a href="{{ url_for('auth.login') }}" class="text-decoration-none small">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
