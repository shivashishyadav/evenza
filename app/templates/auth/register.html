{% extends 'base.html' %}
{% block title %}Register — Evenza{% endblock %}
{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-lg p-3">
            <div class="card-body">
                <div class="text-center mb-4">
                    <div class="bg-success-subtle d-inline-block p-3 rounded-circle mb-3">
                        <i class="bi bi-person-plus text-success fs-3"></i>
                    </div>
                    <h3 class="fw-bold text-dark">Create Account</h3>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-person text-muted"></i></span>
                            <input type="text" name="name" class="form-control bg-light border-0" placeholder="John Doe" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-envelope text-muted"></i></span>
                            <input type="email" name="email" class="form-control bg-light border-0" placeholder="john@example.com" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small">Password</label>
                            <div class="input-group border rounded bg-light">
                                <input type="password" name="password" id="regPassword" class="form-control bg-transparent border-0 shadow-none" placeholder="••••••••" required>
                                <button class="btn btn-link text-muted border-0 pe-3 shadow-none" type="button" id="toggleRegPassword">
                                    <i class="bi bi-eye-slash" id="regToggleIcon"></i>
                                </button>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small">Register as</label>
                            <select name="role" class="form-select bg-light border-0">
                                <option value="student">Student</option>
                                <option value="organiser">Organiser</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 shadow-sm fw-bold mt-2">Register Now</button>
                </form>

                <div class="text-center mt-4">
                    <p class="text-muted small">Already have an account? 
                        <a href="{{ url_for('auth.login') }}" class="text-primary fw-bold text-decoration-none">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const toggleRegPassword = document.querySelector('#toggleRegPassword');
    const regPassword = document.querySelector('#regPassword');
    const regToggleIcon = document.querySelector('#regToggleIcon');

    toggleRegPassword.addEventListener('click', function () {
        const type = regPassword.getAttribute('type') === 'password' ? 'text' : 'password';
        regPassword.setAttribute('type', type);
        regToggleIcon.classList.toggle('bi-eye');
        regToggleIcon.classList.toggle('bi-eye-slash');
    });
</script>
{% endblock %}
