{% extends 'base.html' %}
{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm p-4 rounded-4">
                <div class="text-center mb-4">
                    <h3 class="fw-bold">Create New Password</h3>
                    <p class="text-muted small">Enter a strong password to secure your account.</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-uppercase" style="letter-spacing: 0.5px;">New Password</label>
                        <div class="input-group">
                            <input type="password" id="password" name="password" class="form-control border-end-0" required minlength="5" placeholder="••••••••">
                            <span class="input-group-text bg-white border-start-0 text-muted" id="togglePassword" style="cursor: pointer;">
                                <i class="bi bi-eye-slash" id="toggleIcon"></i>
                            </span>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-uppercase" style="letter-spacing: 0.5px;">Confirm Password</label>
                        <div class="input-group">
                            <input type="password" id="confirm_password" name="confirm_password" class="form-control border-end-0" required minlength="5" placeholder="••••••••">
                            <span class="input-group-text bg-white border-start-0 text-muted" id="toggleConfirmPassword" style="cursor: pointer;">
                                <i class="bi bi-eye-slash" id="toggleConfirmIcon"></i>
                            </span>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold shadow-sm">
                        Update Password
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Toggle for Main Password
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');
    const toggleIcon = document.querySelector('#toggleIcon');

    togglePassword.addEventListener('click', function () {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        toggleIcon.classList.toggle('bi-eye');
        toggleIcon.classList.toggle('bi-eye-slash');
    });

    // Toggle for Confirm Password
    const toggleConfirmPassword = document.querySelector('#toggleConfirmPassword');
    const confirmPassword = document.querySelector('#confirm_password');
    const toggleConfirmIcon = document.querySelector('#toggleConfirmIcon');

    toggleConfirmPassword.addEventListener('click', function () {
        const type = confirmPassword.getAttribute('type') === 'password' ? 'text' : 'password';
        confirmPassword.setAttribute('type', type);
        toggleConfirmIcon.classList.toggle('bi-eye');
        toggleConfirmIcon.classList.toggle('bi-eye-slash');
    });
</script>
{% endblock %}
