{% extends 'base.html' %}
{% block title %}Login — Evenza{% endblock %}
{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow-lg p-3">
            <div class="card-body">
                <div class="text-center mb-4">
                    <div class="bg-primary-subtle d-inline-block p-3 rounded-circle mb-3">
                        <i class="bi bi-shield-lock text-primary fs-3"></i>
                    </div>
                    <h3 class="fw-bold text-dark">Welcome Back</h3>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-envelope text-muted"></i></span>
                            <input type="email" name="email" class="form-control bg-light border-0" placeholder="name@example.com" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold small">Password</label>
                        <div class="input-group border rounded bg-light">
                            <span class="input-group-text bg-transparent border-0"><i class="bi bi-key text-muted"></i></span>
                            <input type="password" name="password" id="password" class="form-control bg-transparent border-0 shadow-none" placeholder="••••••••" required>
                            <button class="btn btn-link text-muted border-0 pe-3 shadow-none" type="button" id="togglePassword">
                                <i class="bi bi-eye-slash" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 shadow-sm fw-bold">Sign In</button>
                </form>

                <div class="text-center mt-4">
                    <p class="text-muted small">New to Evenza? 
                        <a href="{{ url_for('auth.register') }}" class="text-primary fw-bold text-decoration-none">Create an account</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');
    const toggleIcon = document.querySelector('#toggleIcon');

    togglePassword.addEventListener('click', function () {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        toggleIcon.classList.toggle('bi-eye');
        toggleIcon.classList.toggle('bi-eye-slash');
    });
</script>
{% endblock %}
